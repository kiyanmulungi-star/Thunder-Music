name: Build and Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Cache Pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter web (auto base-href)
        env:
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          if [[ "${{ github.repository }}" == *".github.io"* ]]; then
            echo "User/Org page detected; building with base href /"
            flutter build web --release --base-href /
          else
            echo "Project page detected; building with base href /${REPO_NAME}/"
            flutter build web --release --base-href /${REPO_NAME}/
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web