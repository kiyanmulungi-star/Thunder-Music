name: thunder_music
description: A simple Spotify search and playback demo (PKCE + Web Auth).
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=2.18.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.5

  # HTTP requests
  http: ^0.13.6

  # PKCE + browser auth helper
  flutter_web_auth_2: ^0.5.0

  # SHA256 for PKCE
  crypto: ^3.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true